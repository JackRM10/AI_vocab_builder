<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vocabulary Builder</title>
</head>
<body>
    <main>
        <h1>AI Vocabulary Builder</h1>

        <section>
            <h2>Featured Word</h2>

            <h3>{{ word }}</h3>

            <p>
                <strong>Part of speech:</strong>
                {{ pos }}
            </p>

            <p>
                <strong>Definition:</strong>
                {{ definition }}
            </p>
        </section>
    </main>
</body>
</html>
